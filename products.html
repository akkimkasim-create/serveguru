<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Bharat Trading Corporation</title>
    <meta name="description" content="Browse premium sewing machines from Singer, Usha, Jack, Juki, Brother and more at best prices in Coimbatore.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF6B35' rx='15' width='100' height='100'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='48' font-weight='bold' font-family='sans-serif'%3EBTC%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/products.css">
</head>
<body>
    <nav id="main-nav"></nav>

    <section class="page-header">
        <div class="container">
            <h1>Our <span class="gradient-text">Products</span></h1>
            <div class="breadcrumb"><a href="index.html">Home</a><span class="separator">›</span><span class="current">Products</span></div>
        </div>
    </section>

    <section class="section products-section">
        <div class="container">
            <div class="products-layout">
                <!-- Sidebar -->
                <aside class="filter-sidebar glass-card" id="filterSidebar">
                    <div class="filter-header">
                        <h3>Filters</h3>
                        <button class="btn btn-sm" onclick="clearFilters()">Clear All</button>
                    </div>
                    <div class="filter-group">
                        <label>Search</label>
                        <input type="text" class="form-control" id="searchInput" placeholder="Search products..." oninput="applyFilters()">
                    </div>
                    <div class="filter-group">
                        <label>Brand</label>
                        <div class="checkbox-group" id="brandFilters"></div>
                    </div>
                    <div class="filter-group">
                        <label>Category</label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="category" value="All" checked onchange="applyFilters()"> All</label>
                            <label class="radio-item"><input type="radio" name="category" value="Domestic" onchange="applyFilters()"> Domestic</label>
                            <label class="radio-item"><input type="radio" name="category" value="Industrial" onchange="applyFilters()"> Industrial</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label>Price Range</label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="price" value="all" checked onchange="applyFilters()"> All Prices</label>
                            <label class="radio-item"><input type="radio" name="price" value="0-10000" onchange="applyFilters()"> Under ₹10,000</label>
                            <label class="radio-item"><input type="radio" name="price" value="10000-25000" onchange="applyFilters()"> ₹10,000 - ₹25,000</label>
                            <label class="radio-item"><input type="radio" name="price" value="25000-50000" onchange="applyFilters()"> ₹25,000 - ₹50,000</label>
                            <label class="radio-item"><input type="radio" name="price" value="50000-999999" onchange="applyFilters()"> Above ₹50,000</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="toggle-label">
                            <span>In Stock Only</span>
                            <input type="checkbox" id="stockFilter" onchange="applyFilters()">
                            <span class="toggle-switch"></span>
                        </label>
                    </div>
                </aside>

                <!-- Products Grid -->
                <div class="products-main">
                    <div class="products-toolbar">
                        <span class="result-count" id="resultCount">0 products</span>
                        <div class="toolbar-right">
                            <select class="form-control" id="sortSelect" onchange="applyFilters()" style="width:auto;">
                                <option value="featured">Featured</option>
                                <option value="name-asc">Name A-Z</option>
                                <option value="name-desc">Name Z-A</option>
                                <option value="price-asc">Price: Low to High</option>
                                <option value="price-desc">Price: High to Low</option>
                            </select>
                            <button class="btn-icon" id="mobileFilterBtn" onclick="toggleSidebar()">☰</button>
                        </div>
                    </div>
                    <div class="products-grid" id="productsGrid"></div>
                    <div class="empty-state" id="emptyState" style="display:none;">
                        <div class="empty-icon">🔍</div>
                        <h3>No products found</h3>
                        <p>Try adjusting your filters or search term</p>
                        <button class="btn btn-primary" onclick="clearFilters()">Clear Filters</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Quick View Modal -->
    <div class="modal-overlay" id="quickViewModal">
        <div class="modal" style="max-width:750px;">
            <div class="modal-header">
                <h3 id="qvName"></h3>
                <button class="modal-close" onclick="closeModal('quickViewModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="qv-layout">
                    <div class="qv-image product-img-placeholder" id="qvImage" style="height:250px;border-radius:12px;"></div>
                    <div class="qv-details">
                        <span class="badge badge-primary" id="qvBrand"></span>
                        <div class="qv-price" id="qvPrice"></div>
                        <p id="qvDesc"></p>
                        <div id="qvSpecs"></div>
                        <div style="display:flex;gap:10px;margin-top:16px;">
                            <a class="btn btn-secondary" id="qvDetailLink">View Full Details</a>
                            <button class="btn btn-primary" id="qvCartBtn">Add to Cart</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer id="main-footer"></footer>
    <script src="js/app.js"></script>
    <script src="js/data-seed.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
