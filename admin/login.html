<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Security Gateway</title>
    <style>
        /* Force clear reset to block browser autofill distortions */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f172a;
            color: #334155;
        }
        .login-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            text-align: left;
        }
        h2 {
            margin-bottom: 1.5rem;
            text-align: center;
            color: #0f172a;
            font-weight: 800;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            width: 100%;
            height: 45px;
            padding: 0 1rem !important;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            background-color: #ffffff !important;
            color: #0f172a !important;
            outline: none;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
        }
        .forgot-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .btn-primary {
            width: 100%;
            height: 45px;
            border: none;
            background: #2563eb;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>BTC Admin Portal</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="adm-user" class="form-control" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adm-pass" class="form-control" autocomplete="off" required>
            </div>
            
            <div class="options-row">
                <label style="display: flex; align-items: center; transform: none; text-transform: none; font-weight: normal; color: #64748b; margin: 0; cursor: pointer;">
                    <input type="checkbox" style="margin-right: 0.5rem; width: 15px; height: 15px;"> Remember me
                </label>
                <span class="forgot-link" onclick="triggerForgotPassword()">Forgot Password?</span>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
    </div>

    <script>
        // Form submit credential verification logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('adm-user').value.trim();
            const passwordInput = document.getElementById('adm-pass').value.trim();
            
            // Permissive checker to catch single or double "k" autofill bugs instantly
            if (usernameInput === 'if0_42181420' && (passwordInput === 'akkimALLAH05' || passwordInput === 'akimALLAH05')) {
                sessionStorage.setItem('btc_admin_authenticated', 'true');
                window.location.href = 'index.html';
            } else {
                alert('Invalid credentials. Please verify your entries or use Forgot Password option.');
            }
        });

        // Forgot Password recovery pipeline execution function
        function triggerForgotPassword() {
            const verificationUser = prompt("Enter administrative username string to verify authorization:");
            
            if (verificationUser === null) return; // User canceled the dialog
            
            if (verificationUser.trim() === 'if0_42181420') {
                alert("Identity verified safely.\n\nYour account clearance master credential parameters are:\nPassword: akkimALLAH05");
            } else {
                alert("Verification failure. Provided username does not match database record mapping.");
            }
        }
    </script>

</body>
</html>
