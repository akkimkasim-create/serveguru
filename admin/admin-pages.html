<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Content | BTC Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-page">
    <aside id="admin-sidebar"></aside>
    <main class="admin-main">
        <header id="admin-header"></header>
        <div class="admin-content">
            <!-- Tabs -->
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchPageTab('hero', this)">🏠 Hero Section</button>
                <button class="admin-tab" onclick="switchPageTab('about', this)">📖 About</button>
                <button class="admin-tab" onclick="switchPageTab('stats', this)">📊 Stats</button>
                <button class="admin-tab" onclick="switchPageTab('testimonials', this)">⭐ Testimonials</button>
            </div>

            <!-- Hero Tab -->
            <div class="page-tab active" id="tab-hero">
                <div class="admin-table-wrapper" style="padding:24px">
                    <h3 style="margin-bottom:20px">Hero Section Content</h3>
                    <div class="form-group"><label>Title</label><input class="form-control" id="heroTitle"></div>
                    <div class="form-group"><label>Subtitle</label><input class="form-control" id="heroSubtitle"></div>
                    <div class="form-group"><label>Description</label><textarea class="form-control" id="heroDesc" rows="3"></textarea></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                        <div class="form-group"><label>Primary CTA Text</label><input class="form-control" id="heroCta1"></div>
                        <div class="form-group"><label>Secondary CTA Text</label><input class="form-control" id="heroCta2"></div>
                    </div>
                </div>
            </div>

            <!-- About Tab -->
            <div class="page-tab" id="tab-about">
                <div class="admin-table-wrapper" style="padding:24px">
                    <h3 style="margin-bottom:20px">About Page Content</h3>
                    <div class="form-group"><label>Company Story</label><textarea class="form-control" id="aboutStory" rows="5"></textarea></div>
                    <div class="form-group"><label>Mission Statement</label><textarea class="form-control" id="aboutMission" rows="3"></textarea></div>
                    <div class="form-group"><label>Vision Statement</label><textarea class="form-control" id="aboutVision" rows="3"></textarea></div>
                </div>
            </div>

            <!-- Stats Tab -->
            <div class="page-tab" id="tab-stats">
                <div class="admin-table-wrapper" style="padding:24px">
                    <h3 style="margin-bottom:20px">Statistics Counters</h3>
                    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">
                        <div class="form-group"><label>Years in Business</label><input type="number" class="form-control" id="statYears"></div>
                        <div class="form-group"><label>Happy Customers</label><input type="number" class="form-control" id="statCustomers"></div>
                        <div class="form-group"><label>Brands</label><input type="number" class="form-control" id="statBrands"></div>
                        <div class="form-group"><label>Services Completed</label><input type="number" class="form-control" id="statServices"></div>
                    </div>
                </div>
            </div>

            <!-- Testimonials Tab -->
            <div class="page-tab" id="tab-testimonials">
                <div class="admin-table-wrapper" style="padding:24px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                        <h3>Testimonials</h3>
                        <button class="btn btn-primary btn-sm" onclick="addTestimonial()">+ Add Testimonial</button>
                    </div>
                    <div id="testimonialsList"></div>
                </div>
            </div>

            <!-- Save Button -->
            <div style="display:flex;gap:12px;margin-top:24px">
                <button class="btn btn-primary btn-lg" onclick="savePageContent()">💾 Save All Changes</button>
                <a href="../index.html" target="_blank" class="btn btn-secondary btn-lg">👁 Preview Website</a>
                <button class="btn btn-sm" style="margin-left:auto;background:var(--danger);color:#fff" onclick="resetPageContent()">Reset to Defaults</button>
            </div>
        </div>
    </main>
    <script src="../js/app.js"></script>
    <script src="../js/data-seed.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/admin-pages.js"></script>
</body>
</html>
