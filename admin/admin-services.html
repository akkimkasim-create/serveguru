<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | BTC Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-page">
    <aside id="admin-sidebar"></aside>
    <main class="admin-main">
        <header id="admin-header"></header>
        <div class="admin-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                <h2 style="font-size:1.3rem">Manage Services</h2>
                <button class="btn btn-primary" onclick="openServiceModal()">+ Add Service</button>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table"><thead><tr><th>Icon</th><th>Name</th><th>Price</th><th>Actions</th></tr></thead><tbody id="servicesTableBody"></tbody></table>
            </div>
        </div>
    </main>
    <div class="modal-overlay" id="serviceModal">
        <div class="modal" style="max-width:550px">
            <div class="modal-header"><h3 id="svcModalTitle">Add Service</h3><button class="modal-close" onclick="closeAdminModal('serviceModal')">×</button></div>
            <div class="modal-body">
                <input type="hidden" id="svcEditId">
                <div style="display:grid;grid-template-columns:80px 1fr;gap:16px">
                    <div class="form-group"><label>Icon</label><input class="form-control" id="svcIcon" placeholder="🔧" style="font-size:1.5rem;text-align:center"></div>
                    <div class="form-group"><label>Name *</label><input class="form-control" id="svcName"></div>
                </div>
                <div class="form-group"><label>Description</label><textarea class="form-control" id="svcDesc" rows="3"></textarea></div>
                <div class="form-group"><label>Price</label><input class="form-control" id="svcPrice" placeholder="e.g., Starting from ₹500"></div>
                <div class="form-group"><label>Features (comma-separated)</label><input class="form-control" id="svcFeatures" placeholder="Feature 1, Feature 2"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" onclick="closeAdminModal('serviceModal')">Cancel</button><button class="btn btn-primary" onclick="saveService()">Save</button></div>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script src="../js/data-seed.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/admin-services.js"></script>
</body>
</html>
