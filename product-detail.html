<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Bharat Trading Corporation</title>
    <meta name="description" content="View sewing machine specifications, features, and pricing at Bharat Trading Corporation.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23FF6B35' rx='15' width='100' height='100'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='48' font-weight='bold' font-family='sans-serif'%3EBTC%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/products.css">
    <style>
        .detail-layout{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:60px}
        .detail-image{height:400px;border-radius:var(--radius-lg);overflow:hidden}
        .detail-image .product-img-placeholder{height:100%;font-size:4rem}
        .detail-info .badge{margin-bottom:12px}
        .detail-info h1{font-size:1.8rem;margin-bottom:8px}
        .detail-info .star-rating{margin-bottom:16px}
        .detail-price{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:20px}
        .detail-desc{margin-bottom:20px;font-size:0.95rem;line-height:1.8}
        .detail-features{margin-bottom:24px}
        .detail-features li{padding:6px 0;font-size:0.95rem;color:var(--text-secondary)}
        .detail-features li::before{content:'✓ ';color:var(--success);font-weight:700}
        .qty-selector{display:flex;align-items:center;gap:0;margin-bottom:20px}
        .qty-btn{width:40px;height:40px;background:var(--bg-surface);border:1px solid var(--border-glass);color:var(--text-primary);font-size:1.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition)}
        .qty-btn:hover{background:var(--primary);color:#fff}
        .qty-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
        .qty-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
        .qty-value{width:50px;height:40px;background:var(--bg-surface);border:1px solid var(--border-glass);border-left:0;border-right:0;color:var(--text-primary);text-align:center;font-size:1rem;font-weight:600;display:flex;align-items:center;justify-content:center}
        .detail-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
        .stock-badge{display:flex;align-items:center;gap:6px;font-size:0.9rem;margin-bottom:20px}
        .stock-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
        .tabs{display:flex;gap:0;border-bottom:2px solid var(--border-glass);margin-bottom:24px}
        .tab-btn{padding:12px 24px;background:none;border:none;color:var(--text-muted);font-size:0.95rem;font-weight:600;cursor:pointer;position:relative;transition:color var(--transition)}
        .tab-btn.active{color:var(--primary)}
        .tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--gradient-primary)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .specs-table{width:100%;border-collapse:collapse}
        .specs-table tr{border-bottom:1px solid var(--border-glass)}
        .specs-table td{padding:12px 16px;font-size:0.95rem}
        .specs-table td:first-child{color:var(--text-muted);font-weight:500;width:40%}
        .related-section{margin-top:60px}
        .related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
        @media(max-width:768px){.detail-layout{grid-template-columns:1fr}.detail-image{height:280px}.related-grid{grid-template-columns:repeat(2,1fr)}}
        @media(max-width:480px){.related-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav id="main-nav"></nav>
    <section class="page-header">
        <div class="container">
            <div class="breadcrumb" id="breadcrumb"><a href="index.html">Home</a><span class="separator">›</span><a href="products.html">Products</a><span class="separator">›</span><span class="current" id="bcProduct">Loading...</span></div>
        </div>
    </section>
    <section class="section" style="padding-top:40px">
        <div class="container">
            <div id="productContent">
                <div style="text-align:center;padding:60px"><div class="spinner" style="margin:0 auto"></div></div>
            </div>
        </div>
    </section>
    <footer id="main-footer"></footer>
    <script src="js/app.js"></script>
    <script src="js/data-seed.js"></script>
    <script src="js/product-detail.js"></script>
</body>
</html>
